{% set name = "nine" %}
{% set version = "1.1.0" %}
{% set sha256 = "e8a96b6326341637d25ca9c257c1d2af4033c957946438d9d37bf6eb798d3bbe" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: {{ sha256 }}

build:
  number: 1
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv "
  noarch: python

requirements:
  host:
    - setuptools
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - nine

about:
  home: "https://github.com/nandoflorestan/nine"
  license: "Public domain"
  license_file: "LICENSE.rst"
  summary: "Python 2 / 3 compatibility, like six, but favouring Python 3"
  doc_url: "https://pypi.org/project/nine/"
  dev_url: "https://github.com/nandoflorestan/nine"

extra:
  recipe-maintainers:
    - looooo
